# RookApp — PySide6 desktop build matrix.
#
# Builds a onedir PyInstaller bundle per host OS. The Qt app imports
# the wider EdgeVox framework (agents, LLM, chess integration) but
# deliberately skips STT/TTS/wake-word backends at startup — the spec
# file excludes their heavy deps so the bundle stays around ~400 MB.
#
# CI budget policy:
#   * push to main: Linux-only smoke build. Catches regressions
#     cheaply on every merge; full matrix is not warranted because
#     the macOS/Windows legs cost 10× / 2× minute multipliers.
#   * pull_request: Linux-only smoke build. Same rationale.
#   * tag ``rook-v*``: full matrix (macOS arm + intel, Windows,
#     Linux), zipped and attached to the GitHub release.
#   * workflow_dispatch: full matrix on demand, for manually
#     verifying a release candidate.
#
# Every matrix leg runs a self-test on the produced binary
# (``RookApp --self-test``) to catch missing hidden imports /
# assets in the frozen bundle before users see a crash.

name: RookApp Desktop

on:
  push:
    branches: [main]
    tags: ["rook-v*"]
    paths:
      - "edgevox/apps/chess_robot_qt/**"
      - "edgevox/agents/**"
      - "edgevox/llm/**"
      - "edgevox/integrations/chess/**"
      - "edgevox/examples/agents/chess_robot/**"
      - "rookapp_entry.py"
      - "packaging/rookapp.spec"
      - "pyproject.toml"
      - ".github/workflows/rookapp-desktop.yml"
  pull_request:
    paths:
      - "edgevox/apps/chess_robot_qt/**"
      - "rookapp_entry.py"
      - "packaging/rookapp.spec"
      - ".github/workflows/rookapp-desktop.yml"
  workflow_dispatch:

# A new push on the same branch cancels the in-flight run — stops
# matrix jobs from piling up when the user pushes several commits in
# a row. Releases (tags) are never cancelled: a tagged build is
# load-bearing for the GitHub release artefacts.
concurrency:
  group: rookapp-desktop-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Expands the matrix conditionally: everyday pushes / PRs get the
  # Linux leg only (cheap), while tagged releases and manual dispatch
  # fan out to the full four-OS matrix. We build the matrix in a
  # preceding job so the dependency is explicit in the job graph.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/rook-v* || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo 'include=[{"name":"macos-arm","runner":"macos-14"},{"name":"macos-intel","runner":"macos-13"},{"name":"windows","runner":"windows-latest"},{"name":"linux","runner":"ubuntu-22.04"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'include=[{"name":"linux","runner":"ubuntu-22.04"}]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ---- Platform-specific system deps ----
      # Stockfish is the chess engine the agent shells out to; we
      # install it so the smoke test can at least exercise the engine
      # preflight, even though we don't actually play a game in CI.
      # Linux additionally needs the X/xcb libs for PySide6 plugin
      # loading and xvfb so the self-test can create a QApplication.
      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            stockfish \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1 \
            libopengl0 \
            libfontconfig1 \
            libdbus-1-3 \
            xvfb

      - name: Install macOS system deps
        if: startsWith(matrix.runner, 'macos-')
        run: brew install stockfish

      - name: Install Windows system deps
        if: matrix.runner == 'windows-latest'
        # Stockfish on Windows: users install it themselves. The
        # self-test doesn't exercise engine startup, only imports.
        shell: bash
        run: echo "stockfish must be provided by the user on Windows"

      # ---- Python deps ----
      # We install the project in editable mode with the desktop
      # extras (PySide6, qtawesome, rlottie-python, pillow) plus the
      # full edgevox runtime. The spec file excludes the heavy
      # STT/TTS deps so they're installed but not bundled.
      - name: Upgrade pip + wheel
        shell: bash
        run: python -m pip install --upgrade pip wheel

      - name: Install edgevox
        shell: bash
        run: pip install -e ".[desktop]"

      - name: Install PyInstaller
        shell: bash
        run: pip install "pyinstaller>=6.10"

      # ---- Build ----
      - name: Build onedir bundle
        shell: bash
        run: |
          pyinstaller packaging/rookapp.spec --clean --noconfirm --log-level INFO
          ls -la dist/
          ls -la dist/RookApp/ | head -30

      # ---- Smoke test — verify the built binary imports cleanly ----
      # The self-test imports every module the real launch path hits
      # and checks bundled assets exist. If a hidden import was missed
      # or an asset wasn't collected, this fails the build loudly.
      - name: Smoke test (Linux, via xvfb)
        if: matrix.runner == 'ubuntu-22.04'
        shell: bash
        run: |
          chmod +x dist/RookApp/RookApp
          xvfb-run -a --server-args="-screen 0 1024x768x24" \
            dist/RookApp/RookApp --self-test

      - name: Smoke test (macOS)
        if: startsWith(matrix.runner, 'macos-')
        shell: bash
        run: |
          chmod +x dist/RookApp/RookApp
          dist/RookApp/RookApp --self-test

      - name: Smoke test (Windows)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          dist\RookApp\RookApp.exe --self-test

      # ---- Package ----
      # Zip the onedir output per platform — GH artifact upload
      # already zips, but a tagged, pre-zipped bundle is what we
      # attach to the release. Naming follows ``RookApp-<os>.zip``.
      - name: Package bundle (Unix)
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          cd dist
          zip -rq RookApp-${{ matrix.name }}.zip RookApp
          ls -la RookApp-${{ matrix.name }}.zip

      - name: Package bundle (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\RookApp -DestinationPath dist\RookApp-${{ matrix.name }}.zip
          Get-ChildItem dist\RookApp-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rookapp-${{ matrix.name }}
          path: dist/RookApp-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/rook-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
