# RookApp — Tauri desktop build matrix.
#
# Triggered on:
#   - push to main (smoke-build, no artifact upload unless manually)
#   - tags matching `rook-v*` → uploads installers to the matching GitHub release
#   - manual workflow_dispatch
#
# Produces:
#   macOS   → .app (universal) + .dmg
#   Windows → .msi + .exe installer
#   Linux   → .AppImage + .deb + .rpm
#
# Cross-compilation isn't supported by Tauri (each platform has a
# distinct WebView backend), so the matrix runs on native runners.

name: RookApp Desktop

on:
  push:
    branches: [main]
    tags: ["rook-v*"]
    paths:
      - "webui/**"
      - "edgevox/examples/agents/chess_robot/**"
      - "edgevox/server/**"
      - ".github/workflows/rookapp-desktop.yml"
  pull_request:
    paths:
      - "webui/**"
      - ".github/workflows/rookapp-desktop.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: macos-intel
            runner: macos-13
            target: x86_64-apple-darwin
            bundles: app,dmg
          - name: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - name: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ---- Frontend prereqs ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json

      # ---- Rust toolchain ----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "webui/src-tauri -> target"

      # ---- Platform-specific system deps ----
      - name: Install Linux deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      # ---- Install Tauri CLI ----
      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      # ---- Build frontend into edgevox/server/static ----
      - name: Install webui deps
        working-directory: webui
        run: npm ci

      - name: Build webui
        working-directory: webui
        run: npm run build

      # ---- Tauri build ----
      - name: Build Tauri app
        working-directory: webui/src-tauri
        env:
          # Release builds default to the chess agent + Rook mode.
          EDGEVOX_DESKTOP_AGENT: "edgevox.examples.agents.chess_robot.app:build_rook_server_agent"
          ROOK_MODE: "1"
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # ---- Collect artifacts ----
      - name: Gather installers
        shell: bash
        run: |
          mkdir -p artifacts
          # Common output paths per bundle type.
          BASE="webui/src-tauri/target/${{ matrix.target }}/release/bundle"
          for d in appimage deb rpm dmg macos msi nsis; do
            if [ -d "$BASE/$d" ]; then
              find "$BASE/$d" -maxdepth 2 -type f \( -iname "*.appimage" -o -iname "*.deb" -o -iname "*.rpm" -o -iname "*.dmg" -o -iname "*.app.tar.gz" -o -iname "*.msi" -o -iname "*.exe" \) -exec cp {} artifacts/ \;
            fi
          done
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: rookapp-${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 7

  # ---- Attach installers to the tagged GitHub release ----
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/rook-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
