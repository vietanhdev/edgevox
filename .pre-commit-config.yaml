# Run `pre-commit install` once to enable.
# Update hooks with `pre-commit autoupdate`.
# Run on all files with `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the local ruff resolved by `uv run ruff --version`.
    # The old v0.8.6 pin still enforced UP038, which ruff upstream deprecated
    # (MicroOpt: union in isinstance has tuple-unpack overhead) and removed in
    # 0.11+ — producing 11 "errors" the project ruff no longer reports.
    rev: v0.15.10
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
